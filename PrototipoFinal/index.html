<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Habitación IoT</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; text-align: center; background-color: #f4f4f9; color: #333; }
        h1 { color: #2c3e50; }
        .panel { background: white; border-radius: 10px; padding: 20px; margin: 20px auto; max-width: 800px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .controles { display: flex; justify-content: space-around; flex-wrap: wrap; }
        .grupo-control { margin: 15px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background-color: #fafafa; min-width: 180px; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; color: white; transition: 0.3s; width: 80px;}
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-on { background-color: #27ae60; }
        .btn-off { background-color: #c0392b; }
        .btn-abrir { background-color: #2980b9; width: 100px;}
        .btn-cerrar { background-color: #f39c12; width: 100px;}
        
        /* Estilos del botón de Modo */
        .btn-modo { width: 210px; font-size: 14px; margin-bottom: 15px;}
        .modo-manual { background-color: #34495e; }
        .modo-auto { background-color: #8e44ad; }

        /* Switch styles */
        .switch-container { display: flex; align-items: center; justify-content: center; margin: 10px 0; }
        .switch { position: relative; display: inline-block; width: 56px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #c0392b; transition: 0.25s; border-radius: 30px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: 0.25s; border-radius: 50%; }
        input:checked + .slider { background-color: #27ae60; }
        input:checked + .slider:before { transform: translateX(26px); }
        .label-inline { display: inline-block; margin-left: 8px; font-weight: 600; }

        canvas { max-width: 100%; height: auto; }
        #estado-conexion { font-weight: bold; color: #e67e22; margin-bottom: 15px; }
    </style>
</head>
<body>

    <h1>Control de Habitación Inteligente</h1>
    <div id="estado-conexion">Conectando al Broker MQTT...</div>
    
    <div class="panel">
        <h2>Panel de Control</h2>
        <div class="controles">
            <div class="grupo-control">
                <h3>Luces (1, 2, 3)</h3>
                <div style="margin-bottom:8px;">
                    <label class="switch">
                        <input type="checkbox" id="luz1" onchange="cambiarLuz('proyecto/cuarto/luz/1', this.checked)">
                        <span class="slider"></span>
                    </label>
                    <span class="label-inline">Luz 1 (Roja)</span>
                </div>
                <div style="margin-bottom:8px;">
                    <label class="switch">
                        <input type="checkbox" id="luz2" onchange="cambiarLuz('proyecto/cuarto/luz/2', this.checked)">
                        <span class="slider"></span>
                    </label>
                    <span class="label-inline">Luz 2 (Verde)</span>
                </div>
                <div>
                    <label class="switch">
                        <input type="checkbox" id="luz3" onchange="cambiarLuz('proyecto/cuarto/luz/3', this.checked)">
                        <span class="slider"></span>
                    </label>
                    <span class="label-inline">Luz 3 (Azul)</span>
                </div>
            </div>

            <div class="grupo-control">
                <h3>Ventana (Servo)</h3>
                <button id="btnModo" class="btn-modo modo-manual" onclick="alternarModo()">Modo: MANUAL</button>
                <br>
                <div class="switch-container" style="margin-top:10px;">
                    <label class="switch">
                        <input type="checkbox" id="ventanaSwitch" onchange="cambiarVentana(this.checked)">
                        <span class="slider"></span>
                    </label>
                    <span id="estadoVentanaLabel" class="label-inline">CERRADA</span>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <h2>Monitor de Clima</h2>
        <canvas id="graficaClima"></canvas>
    </div>

    <script>
        // Variables globales
        let modoActual = 'MANUAL';
        const ctx = document.getElementById('graficaClima').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [
                    { label: 'Temperatura (°C)', data: [], borderColor: '#e74c3c', backgroundColor: 'rgba(231, 76, 60, 0.2)', tension: 0.3, fill: true },
                    { label: 'Humedad (%)', data: [], borderColor: '#3498db', backgroundColor: 'rgba(52, 152, 219, 0.2)', tension: 0.3, fill: true }
                ]
            },
            options: { responsive: true, animation: { duration: 0 } }
        });

        const brokerUrl = 'ws://broker.mqttdashboard.com:8000/mqtt';
        const client = mqtt.connect(brokerUrl);
        const estadoTexto = document.getElementById('estado-conexion');

        client.on('connect', function () {
            estadoTexto.innerText = "¡Conectado al Broker MQTT (HiveMQ)!";
            estadoTexto.style.color = "#27ae60";
            
            // Suscripciones
            client.subscribe('proyecto/cuarto/clima');
            client.subscribe('proyecto/cuarto/estado_modo'); 
            client.subscribe('proyecto/cuarto/estado_ventana');
            
            // Forzar estado inicial en el ESP32 por si acaso
            enviarMensaje('proyecto/cuarto/modo_ventana', 'MANUAL'); 
        });

        client.on('message', function (topic, message) {
            const payload = message.toString();
            
            if (topic === 'proyecto/cuarto/clima') {
                try {
                    const datos = JSON.parse(payload);
                    const hora = new Date().toLocaleTimeString();
                    chart.data.labels.push(hora);
                    chart.data.datasets[0].data.push(datos.temp);
                    chart.data.datasets[1].data.push(datos.hum);
                    // Actualizar las etiquetas de la leyenda con los valores actuales
                    try {
                        chart.data.datasets[0].label = `Temperatura (°C): ${Number(datos.temp).toFixed(1)}°C`;
                        chart.data.datasets[1].label = `Humedad (%): ${Number(datos.hum).toFixed(0)}%`;
                    } catch(e) { /* ignore formatting errors */ }
                    
                    if(chart.data.labels.length > 15) { 
                        chart.data.labels.shift();
                        chart.data.datasets[0].data.shift();
                        chart.data.datasets[1].data.shift();
                    }
                    chart.update();
                } catch (e) {}
            }
            // Cuando el ESP32 cambia el modo (desde el botón físico u otro lado), recibimos la confirmación aquí
            else if (topic === 'proyecto/cuarto/estado_modo') {
                modoActual = payload;
                actualizarUiModo();
            }
            else if (topic === 'proyecto/cuarto/estado_ventana') {
                // payload esperado: 'ABRIR' / 'CERRAR' o 'OPEN' / 'CLOSED'
                const sw = document.getElementById('ventanaSwitch');
                const lbl = document.getElementById('estadoVentanaLabel');
                if (!sw) return;
                if (payload.toUpperCase() === 'ABRIR' || payload.toUpperCase() === 'OPEN' || payload.toLowerCase() === 'true') {
                    sw.checked = true;
                    if (lbl) lbl.innerText = 'ABIERTA';
                } else {
                    sw.checked = false;
                    if (lbl) lbl.innerText = 'CERRADA';
                }
            }
        });

        function alternarModo() {
            // El clic desde la web sugiere el cambio
            const nuevoModo = (modoActual === 'MANUAL') ? 'AUTO' : 'MANUAL';
            enviarMensaje('proyecto/cuarto/modo_ventana', nuevoModo);
        }

        function actualizarUiModo() {
            const btnModo = document.getElementById('btnModo');
            const ventanaSwitch = document.getElementById('ventanaSwitch');
            const estadoLbl = document.getElementById('estadoVentanaLabel');
            
            if (modoActual === 'AUTO') {
                btnModo.innerText = 'Modo: AUTOMÁTICO';
                btnModo.className = 'btn-modo modo-auto';
                if (ventanaSwitch) ventanaSwitch.disabled = true;
                if (estadoLbl) estadoLbl.style.opacity = 0.6;
            } else {
                btnModo.innerText = 'Modo: MANUAL';
                btnModo.className = 'btn-modo modo-manual';
                if (ventanaSwitch) ventanaSwitch.disabled = false;
                if (estadoLbl) estadoLbl.style.opacity = 1;
            }
        }

        // Cambiar estado de una luz mediante switch
        function cambiarLuz(topic, isChecked) {
            const mensaje = isChecked ? 'ON' : 'OFF';
            enviarMensaje(topic, mensaje);
        }

        // Cambiar ventana con switch (solo en modo manual el switch estará habilitado)
        function cambiarVentana(isChecked) {
            const mensaje = isChecked ? 'ABRIR' : 'CERRAR';
            const lbl = document.getElementById('estadoVentanaLabel');
            if (lbl) lbl.innerText = isChecked ? 'ABIERTA' : 'CERRADA';
            enviarMensaje('proyecto/cuarto/ventana', mensaje);
        }

        function enviarMensaje(topic, msg) {
            if (client.connected) {
                client.publish(topic, msg);
            }
        }
    </script>
</body>
</html>
